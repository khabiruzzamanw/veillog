<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon_32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon_64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon_180.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Journix</title>
</head>

<body id="home" class="dark">

  <header>
    <nav>
      <ul>
        <li>
          <a href="#home" class="home">Home</a>
        </li>
        <li>
          <img src="images/darkMode.svg" class="theme" id="theme" alt="">
        </li>
      </ul>
    </nav>
  </header>

  <main>

    <aside class="sideBar" id="sideBar">

      <div class="sideBarButton" id="sideBarButton">
        <img src="images/menuLight.svg" class="menu" id="menu" alt="">
      </div>

      <div class="addEntry" id="addEntry">
        <img src="images/addNoteLight.svg" alt="" class="addEntryImage">
        <p class="mutedText">Do a entry</p>
      </div>

      <div class="searchBar">
        <img src="images/searchLight.svg" id="searchbutton" class="searchbutton" alt="">
        <input type="search" name="" id="search" class="search" placeholder="Search" />
      </div>

      <div class="daySelect">
        <div class="dropDownToggler">
          <img src="images/daySelectionLight.svg" alt="" class="daySelectImage">
          <p class="mutedText">Timeline</p>
          <img src="images/dropDownLight.svg" alt="" class="dropDownIcon">
        </div>
        <div class="daySelectGrid dropDown">
          <ul>
            <li>Today</li>
            <li>Yesterday</li>
            <li>Last Week</li>
            <li>Last month</li>
          </ul>
        </div>
      </div>

      <div class="catagorySelect">
        <div class="dropDownToggler">
          <img src="images/catagoryIconLight.svg" alt="" class="catagorySelectImage">
          <p class="mutedText">Catagory</p>
          <img src="images/dropDownLight.svg" alt="" class="dropDownIcon">
        </div>
        <div class="catagorySelectGrid dropDown">
          <ul>
            <li>Note</li>
            <li>Todo</li>
            <li>Journal</li>
          </ul>
        </div>
      </div>

    </aside>

    <section class="contentPage" id="contentPage">

      <div class="warning" id="warning">
        <img src="images/emptyNoteLight.svg" alt="" class="emptyNoteAdd" id="emptyNoteAdd">
        <p>No notes yet</p>
        <p>Start capturing your thoughts.</p>
      </div>

    </section>

  </main>

  <script src="index.js"></script>

</body>

</html>
